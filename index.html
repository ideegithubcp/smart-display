<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Calendar">
  <title>Calendar</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --surface:   #1c1f2b;
      --border:    rgba(255,255,255,0.09);
      --text:      rgba(255,255,255,0.85);
      --text-dim:  rgba(255,255,255,0.38);
      --text-faint:rgba(255,255,255,0.18);
      --today-bg:  #ffffff;
      --today-fg:  #0f1117;
      --accent:    #5b8dee;
      --header-h:  64px;
      --dow-h:     28px;
      --footer-h:  62px;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }

    /* ── Header ── */
    #header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--header-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      z-index: 10;
    }

    .nav-btn {
      width: 40px; height: 40px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 20px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s;
    }
    .nav-btn:active { background: rgba(255,255,255,0.15); }

    #month-title {
      font-size: clamp(20px, 5vw, 30px);
      font-weight: 200;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    #today-btn {
      font-size: 12px;
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-dim);
      cursor: pointer;
      letter-spacing: 0.04em;
      -webkit-tap-highlight-color: transparent;
    }
    #today-btn:active { background: rgba(255,255,255,0.12); color: var(--text); }

    /* ── Day-of-week row ── */
    #dow-row {
      position: fixed;
      top: var(--header-h);
      left: 0; right: 0;
      height: var(--dow-h);
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      padding: 0 12px;
      align-items: center;
      background: var(--bg);
      z-index: 10;
      border-bottom: 1px solid var(--border);
    }

    .dow-label {
      text-align: center;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-faint);
    }
    .dow-label.we { color: rgba(255,100,100,0.45); }

    /* ── Calendar grid ── */
    #cal-grid {
      position: fixed;
      top: calc(var(--header-h) + var(--dow-h));
      left: 0; right: 0;
      bottom: var(--footer-h);
      padding: 8px 12px;
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      /* rows set dynamically */
      gap: 6px;
      overflow: hidden;
    }

    /* ── Day cell ── */
    .day {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 7px 7px 5px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 3px;
      min-height: 0;
    }

    .day.other { background: transparent; border-color: transparent; }
    .day.other .day-n { color: var(--text-faint); }

    .day.today { border-color: var(--accent); background: rgba(91,141,238,0.08); }

    .day.weekend .day-n { color: rgba(255,255,255,0.42); }
    .day.today .day-n-wrap .day-n { color: var(--today-fg); }

    .day-n-wrap { flex-shrink: 0; }

    .day-n {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 24px; height: 24px;
      font-size: 13px;
      font-weight: 400;
      color: var(--text);
      border-radius: 50%;
      line-height: 1;
    }

    .day.today .day-n {
      background: var(--today-bg);
      color: var(--today-fg);
      font-weight: 700;
    }

    /* ── Events inside a cell ── */
    .ev {
      flex-shrink: 0;
      font-size: 10px;
      line-height: 1.35;
      border-radius: 4px;
      padding: 1px 5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      background: rgba(91,141,238,0.22);
      color: rgba(255,255,255,0.78);
    }
    .ev.allday { background: rgba(91,141,238,0.32); }
    .ev-time { color: rgba(255,255,255,0.38); font-size: 9px; margin-right: 3px; }
    .ev-more { font-size: 9px; color: var(--text-faint); padding: 0 3px; flex-shrink: 0; }

    /* ── Footer ── */
    #footer {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: var(--footer-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      border-top: 1px solid var(--border);
      background: var(--bg);
      z-index: 10;
    }

    #date-block { display: flex; flex-direction: column; gap: 1px; }
    #day-name  { font-size: 11px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-faint); }
    #date-full { font-size: 16px; font-weight: 300; color: var(--text-dim); }

    #clock { font-size: 38px; font-weight: 200; letter-spacing: -0.5px; color: var(--text); }

    /* ── Setup banner ── */
    #setup-banner {
      position: fixed;
      bottom: var(--footer-h);
      left: 0; right: 0;
      padding: 10px 20px;
      background: rgba(91,141,238,0.12);
      border-top: 1px solid rgba(91,141,238,0.25);
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      text-align: center;
      z-index: 9;
      display: none;
    }

    /* ── Cal status indicator ── */
    #cal-status {
      font-size: 10px;
      color: var(--text-faint);
      letter-spacing: 0.04em;
    }

    /* ── Screensaver overlay ── */
    #screensaver {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 100;
      background: #000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 1.5s ease-in-out;
    }
    #screensaver.visible {
      opacity: 1;
      pointer-events: auto;
    }

    /* Two photo layers for crossfade */
    #ss-a, #ss-b {
      position: absolute;
      top: -5%; left: -5%; right: -5%; bottom: -5%;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      transition: opacity 2s ease-in-out;
    }
    #ss-a { opacity: 1; }
    #ss-b { opacity: 0; }

    @keyframes kb-ss {
      from { transform: scale(1.08) translate(1%, 1%); }
      to   { transform: scale(1)    translate(-1%, -1%); }
    }
    .kb-play { animation: kb-ss 35s ease-in-out infinite alternate; }

    /* Clock overlay on screensaver */
    #ss-info {
      position: absolute;
      bottom: 40px; right: 44px;
      text-align: right;
      pointer-events: none;
      text-shadow: 0 2px 20px rgba(0,0,0,0.7);
    }
    #ss-time { font-size: 64px; font-weight: 200; letter-spacing: -1px; color: #fff; line-height: 1; }
    #ss-date { font-size: 18px; font-weight: 300; color: rgba(255,255,255,0.6); margin-top: 4px; }

    #ss-hint {
      position: absolute;
      bottom: 40px; left: 44px;
      font-size: 11px;
      color: rgba(255,255,255,0.25);
      letter-spacing: 0.08em;
      pointer-events: none;
    }

    /* ── Compact layout for small screens (iPad mini, phones) ── */
    @media (max-height: 900px) {
      :root {
        --header-h: 52px;
        --dow-h:    24px;
        --footer-h: 50px;
      }
      #cal-grid { padding: 4px 6px; gap: 4px; }
      .day { padding: 4px 4px 3px; gap: 2px; border-radius: 8px; }
      .day-n { width: 20px; height: 20px; font-size: 11px; }
      .ev { font-size: 9.5px; padding: 1px 3px; }
      #month-label { font-size: 17px; }
      #nav-prev, #nav-next { font-size: 20px; }
      #clock { font-size: 17px; }
      #date-str { font-size: 11px; }
    }

    @media (max-height: 700px) {
      :root {
        --header-h: 44px;
        --dow-h:    20px;
        --footer-h: 42px;
      }
      #cal-grid { padding: 2px 4px; gap: 3px; }
      .day { padding: 3px 3px 2px; border-radius: 6px; }
    }
  </style>
</head>
<body>

<script>
const CONFIG = {
  calendarURLs: [
    "https://p174-caldav.icloud.com/published/2/ODE0NjEwMDM3NTgxNDYxMPAkPSus1Y5N3q3NZbzfB9pYPflaVpFJPsNjuZXOhOMguh_AvXoQZp9Cf6pK_jZXnm58SdYmsgnKqDeAFscKfyw"
  ],

  refreshMinutes: 15,   // how often to re-fetch the calendar
  use12Hour: true,      // false = 24-hour clock

  // ── Screensaver / photo slideshow ────────────────────────────────────────
  // Photos are loaded automatically from the "photos/" folder in your GitHub repo.
  // Just upload images there — no need to list them here.
  githubRepo:     "ideegithubcp/smart-display",
  photosFolder:   "photos",

<!-- ══════════════════════════════════════════════════════ -->

<div id="header">
  <button class="nav-btn" onclick="go(-1)" aria-label="Previous month">‹</button>
  <div id="month-title">—</div>
  <button class="nav-btn" onclick="go(1)"  aria-label="Next month">›</button>
</div>

<div id="dow-row">
  <div class="dow-label we">S</div>
  <div class="dow-label">M</div>
  <div class="dow-label">T</div>
  <div class="dow-label">W</div>
  <div class="dow-label">T</div>
  <div class="dow-label">F</div>
  <div class="dow-label we">S</div>
</div>

<div id="cal-grid"></div>

<!-- Screensaver overlay -->
<div id="screensaver">
  <div id="ss-a"></div>
  <div id="ss-b"></div>
  <div id="ss-info">
    <div id="ss-time">—</div>
    <div id="ss-date">—</div>
  </div>
  <div id="ss-hint">tap to return to calendar</div>
</div>

<div id="setup-banner">
  No calendar connected — open <strong>index.html</strong>, find <code>calendarURLs</code> and paste your iCloud ICS URL.
</div>

<div id="footer">
  <div id="date-block">
    <div id="day-name">—</div>
    <div id="date-full">—</div>
  </div>
  <div id="cal-status"></div>
  <div id="clock">—</div>
</div>

<script>
// ─── Globals ──────────────────────────────────────────────────────────────
const MONTHS  = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS    = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
let viewOffset = 0;          // months from today; 0 = current month
let allEvents  = [];         // all parsed ICS events
let calOk      = false;      // has calendar loaded at least once?

// ─── Utilities ────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);

function today() {
  const n = new Date();
  return new Date(n.getFullYear(), n.getMonth(), n.getDate());
}

// ─── Clock ────────────────────────────────────────────────────────────────
function tick() {
  const now = new Date();
  let h = now.getHours(), m = now.getMinutes();
  const suffix = CONFIG.use12Hour ? (h < 12 ? ' AM' : ' PM') : '';
  if (CONFIG.use12Hour) h = h % 12 || 12;
  $('clock').textContent = `${h}:${String(m).padStart(2,'0')}${suffix}`;

  const t = today();
  $('day-name').textContent  = DAYS[t.getDay()].toUpperCase();
  $('date-full').textContent = `${MONTHS[t.getMonth()]} ${t.getDate()}, ${t.getFullYear()}`;
}

// ─── Calendar rendering ───────────────────────────────────────────────────
function go(delta) {
  viewOffset += delta;
  render();
}

function goToday() {
  viewOffset = 0;
  render();
}

function render() {
  const now  = new Date();
  const base = new Date(now.getFullYear(), now.getMonth() + viewOffset, 1);
  const yr   = base.getFullYear();
  const mo   = base.getMonth();
  const tod  = today();

  $('month-title').textContent = `${MONTHS[mo]} ${yr}`;

  const firstDow    = new Date(yr, mo, 1).getDay();
  const daysInMonth = new Date(yr, mo + 1, 0).getDate();
  const prevMonDays = new Date(yr, mo, 0).getDate();
  const weeks       = Math.ceil((firstDow + daysInMonth) / 7);

  const grid = $('cal-grid');

  // Compute row height explicitly — older iOS Safari doesn't expand 1fr rows
  // inside a position:fixed container, leaving blank space below the grid.
  const gridGap   = 6;
  const gridPadV  = 8;
  const availH    = window.innerHeight
                    - parseInt(getComputedStyle(document.documentElement).getPropertyValue('--header-h'))
                    - parseInt(getComputedStyle(document.documentElement).getPropertyValue('--dow-h'))
                    - parseInt(getComputedStyle(document.documentElement).getPropertyValue('--footer-h'))
                    - gridPadV * 2
                    - gridGap  * (weeks - 1);
  const rowH      = Math.floor(availH / weeks);
  grid.style.gridTemplateRows = `repeat(${weeks}, ${rowH}px)`;

  grid.innerHTML = '';

  const eventMap = buildEventMap(yr, mo);

  for (let i = 0; i < weeks * 7; i++) {
    const cell = document.createElement('div');
    let day, cellYr = yr, cellMo = mo, isOther = false;

    if (i < firstDow) {
      day     = prevMonDays - firstDow + i + 1;
      cellMo  = mo - 1 < 0 ? 11 : mo - 1;
      cellYr  = mo - 1 < 0 ? yr - 1 : yr;
      isOther = true;
    } else if (i - firstDow < daysInMonth) {
      day = i - firstDow + 1;
    } else {
      day     = i - firstDow - daysInMonth + 1;
      cellMo  = mo + 1 > 11 ? 0 : mo + 1;
      cellYr  = mo + 1 > 11 ? yr + 1 : yr;
      isOther = true;
    }

    const cellDate = new Date(cellYr, cellMo, day);
    const dow      = i % 7;
    const isToday  = !isOther && cellDate.getTime() === tod.getTime();

    let cls = 'day';
    if (isOther)             cls += ' other';
    if (isToday)             cls += ' today';
    if (dow === 0 || dow === 6) cls += ' weekend';
    cell.className = cls;

    // Day number
    const nWrap = document.createElement('div'); nWrap.className = 'day-n-wrap';
    const nEl   = document.createElement('div'); nEl.className = 'day-n';
    nEl.textContent = day;
    nWrap.appendChild(nEl);
    cell.appendChild(nWrap);

    // Events
    if (!isOther) {
      const evs = eventMap[`${yr}-${mo}-${day}`] || [];
      const MAX = 4;
      evs.slice(0, MAX).forEach(ev => {
        const el = document.createElement('div');
        el.className = ev.allDay ? 'ev allday' : 'ev';
        if (!ev.allDay && ev.timeStr) {
          const t = document.createElement('span');
          t.className = 'ev-time';
          t.textContent = ev.timeStr;
          el.appendChild(t);
        }
        el.appendChild(document.createTextNode(ev.title));
        cell.appendChild(el);
      });
      if (evs.length > MAX) {
        const more = document.createElement('div');
        more.className = 'ev-more';
        more.textContent = `+${evs.length - MAX} more`;
        cell.appendChild(more);
      }
    }

    grid.appendChild(cell);
  }
}

// ─── ICS event map ────────────────────────────────────────────────────────
function buildEventMap(yr, mo) {
  const map   = {};
  const start = new Date(yr, mo, 1);
  const end   = new Date(yr, mo + 1, 0, 23, 59, 59);

  for (const ev of allEvents) {
    if (ev.cancelled) continue;
    const instances = ev.rrule ? expandRRule(ev, start, end) : [ev];
    for (const inst of instances) {
      const d = inst.startDate;
      if (d < start || d > end) continue;
      const key = `${yr}-${mo}-${d.getDate()}`;
      if (!map[key]) map[key] = [];
      map[key].push(inst);
    }
  }

  // Sort each day's events: all-day first, then by time
  for (const key of Object.keys(map)) {
    map[key].sort((a, b) => {
      if (a.allDay !== b.allDay) return a.allDay ? -1 : 1;
      return a.startDate - b.startDate;
    });
  }
  return map;
}

// ─── ICS parser ───────────────────────────────────────────────────────────
function parseICSDate(val) {
  val = val.trim();
  if (val.length === 8) {
    // DATE only — all-day
    return { date: new Date(+val.slice(0,4), +val.slice(4,6)-1, +val.slice(6,8)), allDay: true };
  }
  const y=+val.slice(0,4), mo=+val.slice(4,6)-1, d=+val.slice(6,8);
  const h=+val.slice(9,11), m=+val.slice(11,13), s=+val.slice(13,15)||0;
  const date = val.endsWith('Z')
    ? new Date(Date.UTC(y,mo,d,h,m,s))
    : new Date(y,mo,d,h,m,s);
  return { date, allDay: false };
}

function fmtTime(date, use12) {
  let h = date.getHours(), m = date.getMinutes();
  const suf = use12 ? (h<12?'a':'p') : '';
  if (use12) h = h%12||12;
  return m===0 ? `${h}${suf}` : `${h}:${String(m).padStart(2,'0')}${suf}`;
}

function parseICS(text) {
  text = text.replace(/\r\n[ \t]/g, '').replace(/\r\n/g, '\n').replace(/\r/g, '\n');
  const events = [];
  let ev = null;

  for (const raw of text.split('\n')) {
    const line = raw.trim();
    if (line === 'BEGIN:VEVENT') { ev = {}; continue; }
    if (line === 'END:VEVENT') {
      if (ev && ev.startDate) {
        ev.title    = ev.title || '(No title)';
        ev.timeStr  = ev.allDay ? null : fmtTime(ev.startDate, CONFIG.use12Hour);
        events.push(ev);
      }
      ev = null; continue;
    }
    if (!ev) continue;

    const ci  = line.indexOf(':');
    if (ci < 0) continue;
    const key = line.slice(0, ci).split(';')[0].toUpperCase();
    const val = line.slice(ci + 1);

    switch (key) {
      case 'SUMMARY':
        ev.title = val.replace(/\\,/g, ',').replace(/\\n/g, ' ').replace(/\\;/g, ';').trim();
        break;
      case 'DTSTART': {
        const p = parseICSDate(val);
        ev.startDate = p.date; ev.allDay = p.allDay;
        break;
      }
      case 'DTEND': {
        ev.endDate = parseICSDate(val).date;
        break;
      }
      case 'STATUS':
        if (val.trim() === 'CANCELLED') ev.cancelled = true;
        break;
      case 'RRULE':
        ev.rrule = val.trim();
        break;
    }
  }
  return events;
}

// ─── Basic RRULE expansion ────────────────────────────────────────────────
function expandRRule(ev, winStart, winEnd) {
  const parts = {};
  ev.rrule.split(';').forEach(p => { const [k,v]=p.split('='); parts[k]=v; });
  const freq  = parts['FREQ'];
  if (!freq) return [];

  const count = parts['COUNT'] ? +parts['COUNT'] : 500;
  const until = parts['UNTIL'] ? parseICSDate(parts['UNTIL']).date : null;
  const byDay = (parts['BYDAY']||'').split(',').filter(Boolean);
  const DOWMAP = ['SU','MO','TU','WE','TH','FR','SA'];
  const dur   = ev.endDate ? (ev.endDate - ev.startDate) : 0;
  const DAY   = 86400000;

  const out = [];
  let cur = new Date(ev.startDate), n = 0;

  while (n < count) {
    if (until && cur > until) break;
    if (cur > winEnd) break;

    if (cur >= winStart) {
      const dow = DOWMAP[cur.getDay()];
      if (!byDay.length || byDay.some(b => b.includes(dow))) {
        out.push({ ...ev,
          startDate: new Date(cur),
          endDate: ev.endDate ? new Date(cur.getTime()+dur) : undefined,
          timeStr: ev.allDay ? null : fmtTime(cur, CONFIG.use12Hour),
        });
      }
    }

    if      (freq==='DAILY')   cur = new Date(cur.getTime()+DAY);
    else if (freq==='WEEKLY')  cur = new Date(cur.getTime()+7*DAY);
    else if (freq==='MONTHLY') cur = new Date(cur.getFullYear(), cur.getMonth()+1, cur.getDate());
    else if (freq==='YEARLY')  cur = new Date(cur.getFullYear()+1, cur.getMonth(), cur.getDate());
    else break;
    n++;
  }
  return out;
}

// ─── ICS fetch ────────────────────────────────────────────────────────────
const PROXIES = [
  u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
  u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
  u => `https://cors-anywhere.herokuapp.com/${u}`,
];

async function fetchCalendars() {
  const urls = (CONFIG.calendarURLs || []).filter(Boolean);
  if (!urls.length) {
    $('setup-banner').style.display = 'block';
    $('cal-status').textContent = '';
    return;
  }

  $('cal-status').textContent = 'syncing…';
  const collected = [];

  for (const url of urls) {
    let ok = false;
    for (const proxy of PROXIES) {
      try {
        const res  = await fetch(proxy(url), { cache: 'no-store' });
        if (!res.ok) continue;
        const text = await res.text();
        if (!text.includes('BEGIN:VCALENDAR')) continue;
        collected.push(...parseICS(text));
        ok = true;
        break;
      } catch (_) {}
    }
    if (!ok) console.warn('Could not fetch:', url);
  }

  allEvents = collected;
  calOk     = true;
  const now = new Date();
  $('cal-status').textContent = `synced ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
  render();
}

// ─── Screensaver / photo slideshow ───────────────────────────────────────
let ssPhotos   = [];
let ssIdx      = 0;
let ssActive   = false;
let ssInterval = null;
let ssTransitioning = false;

const ssEl = () => $('screensaver');
const ssA  = () => $('ss-a');
const ssB  = () => $('ss-b');

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function ssSetPhoto(el, url) {
  el.style.backgroundImage = `url(${JSON.stringify(url)})`;
}

function ssKB(el) {
  el.classList.remove('kb-play');
  void el.offsetWidth;
  el.classList.add('kb-play');
}

let ssLayerA, ssLayerB;

function ssNextPhoto() {
  if (!ssPhotos.length || ssTransitioning) return;
  ssTransitioning = true;

  ssIdx = (ssIdx + 1) % ssPhotos.length;
  if (ssIdx === 0) shuffle(ssPhotos);

  ssSetPhoto(ssLayerB, ssPhotos[ssIdx]);
  ssKB(ssLayerB);

  setTimeout(() => {
    ssLayerB.style.opacity = '1';
    ssLayerA.style.opacity = '0';
    setTimeout(() => {
      [ssLayerA, ssLayerB] = [ssLayerB, ssLayerA];
      ssTransitioning = false;
    }, 2200);
  }, 100);
}

function ssUpdateClock() {
  if (!ssActive) return;
  const now = new Date();
  let h = now.getHours(), m = now.getMinutes();
  const suf = CONFIG.use12Hour ? (h < 12 ? ' AM' : ' PM') : '';
  if (CONFIG.use12Hour) h = h % 12 || 12;
  $('ss-time').textContent = `${h}:${String(m).padStart(2,'0')}${suf}`;
  $('ss-date').textContent = `${DAYS[now.getDay()]}, ${MONTHS[now.getMonth()]} ${now.getDate()}`;
}

function showScreensaver() {
  if (ssActive || ssPhotos.length === 0) return;
  ssActive = true;

  ssLayerA = ssA();
  ssLayerB = ssB();
  ssLayerA.style.opacity = '1';
  ssLayerB.style.opacity = '0';

  shuffle(ssPhotos);
  ssIdx = 0;
  ssSetPhoto(ssLayerA, ssPhotos[0]);
  ssKB(ssLayerA);
  if (ssPhotos.length > 1) ssSetPhoto(ssLayerB, ssPhotos[1]);

  ssUpdateClock();
  ssEl().classList.add('visible');

  ssInterval = setInterval(() => {
    ssNextPhoto();
    ssUpdateClock();
  }, CONFIG.photoSeconds * 1000);
}

function hideScreensaver() {
  if (!ssActive) return;
  ssEl().classList.remove('visible');
  ssActive = false;
  clearInterval(ssInterval);
  ssInterval = null;
  resetIdle();
}

async function loadPhotos() {
  const repo   = (CONFIG.githubRepo   || '').trim();
  const folder = (CONFIG.photosFolder || 'photos').trim();
  const extra  = (CONFIG.photos || []).filter(Boolean);
  const EXT    = /\.(jpe?g|png|gif|webp|avif|heic)$/i;

  let fromGitHub = [];
  if (repo) {
    try {
      const res = await fetch(
        `https://api.github.com/repos/${repo}/contents/${folder}`,
        { headers: { Accept: 'application/vnd.github.v3+json' } }
      );
      if (res.ok) {
        const files = await res.json();
        if (Array.isArray(files))
          fromGitHub = files.filter(f => f.type === 'file' && EXT.test(f.name)).map(f => f.download_url);
      }
    } catch (_) {}
  }

  ssPhotos = [...fromGitHub, ...extra];
}

// ─── Idle timer ───────────────────────────────────────────────────────────
let idleTimer = null;
const IDLE_MS = CONFIG.idleMinutes * 60 * 1000;

function resetIdle() {
  clearTimeout(idleTimer);
  idleTimer = setTimeout(showScreensaver, IDLE_MS);
}

// ─── Touch / interaction handling ────────────────────────────────────────
let tx = null, ty = null;

document.addEventListener('touchstart', e => {
  if (ssActive) { e.preventDefault(); return; }
  tx = e.touches[0].clientX;
  ty = e.touches[0].clientY;
  resetIdle();
}, { passive: false });

document.addEventListener('touchend', e => {
  if (ssActive) { hideScreensaver(); return; }

  resetIdle();

  if (tx === null) return;
  const dx = e.changedTouches[0].clientX - tx;
  const dy = e.changedTouches[0].clientY - ty;
  if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy) * 1.5) go(dx < 0 ? 1 : -1);
  tx = ty = null;
}, { passive: false });

// Also reset idle on mouse events (for Mac testing)
document.addEventListener('mousemove', resetIdle, { passive: true });
document.addEventListener('click',     resetIdle, { passive: true });

// Double-tap to jump back to today
let lastTap = 0;
document.addEventListener('touchend', e => {
  if (ssActive) return;
  const now = Date.now();
  if (now - lastTap < 300) goToday();
  lastTap = now;
}, { passive: true });

// Re-render on orientation/resize so row heights recalculate
window.addEventListener('resize', () => render());

// ─── Wake lock ────────────────────────────────────────────────────────────
async function wakeLock() {
  try { if ('wakeLock' in navigator) await navigator.wakeLock.request('screen'); } catch(_) {}
}
wakeLock();
document.addEventListener('visibilitychange', () => { if (document.visibilityState==='visible') wakeLock(); });

// ─── Midnight refresh ─────────────────────────────────────────────────────
function scheduleMidnight() {
  const now  = new Date();
  const next = new Date(now.getFullYear(), now.getMonth(), now.getDate()+1);
  setTimeout(() => { if (viewOffset===0) render(); scheduleMidnight(); }, next-now);
}

// ─── Boot ─────────────────────────────────────────────────────────────────
tick();
setInterval(tick, 10000);

render();
scheduleMidnight();

fetchCalendars();
setInterval(fetchCalendars, CONFIG.refreshMinutes * 60000);

loadPhotos();   // fetch photo list; screensaver starts automatically after idle
resetIdle();    // start the idle countdown
</script>
</body>
</html>
