<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Smart Display">
  <title>Smart Display</title>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent-dim:   rgba(255,255,255,0.55);
      --accent-faint: rgba(255,255,255,0.18);
      --today-bg:     rgba(255,255,255,0.92);
      --today-fg:     #111;
      --panel-bg:     rgba(0,0,0,0.38);
      --panel-border: rgba(255,255,255,0.12);
      --overlay-gradient: linear-gradient(
        to bottom,
        transparent 25%,
        rgba(0,0,0,0.2) 50%,
        rgba(0,0,0,0.7) 78%,
        rgba(0,0,0,0.9) 100%
      );
    }

    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
      -webkit-font-smoothing: antialiased;
      color: #fff;
      cursor: none;
      user-select: none;
      -webkit-user-select: none;
    }

    /* ── Photo layers ── */
    #photo-a, #photo-b {
      position: fixed; inset: -5%;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      transition: opacity 2.5s ease-in-out;
      will-change: transform, opacity;
    }
    #photo-a { z-index: 1; opacity: 1; }
    #photo-b { z-index: 2; opacity: 0; }

    /* Ken Burns variants */
    @keyframes kb1 { from { transform: scale(1.12) translate( 2%,  2%); } to { transform: scale(1)    translate( 0,    0  ); } }
    @keyframes kb2 { from { transform: scale(1)    translate( 0,    0 ); } to { transform: scale(1.1)  translate(-2%, -1%); } }
    @keyframes kb3 { from { transform: scale(1.1)  translate(-2%,  1%); } to { transform: scale(1)    translate( 2%, -1%); } }
    @keyframes kb4 { from { transform: scale(1)    translate( 2%, -2%); } to { transform: scale(1.1)  translate(-1%,  1%); } }
    @keyframes kb5 { from { transform: scale(1.08) translate( 0,  -2%); } to { transform: scale(1)    translate( 0,   2%); } }
    @keyframes kb6 { from { transform: scale(1)    translate(-1%,  0 ); } to { transform: scale(1.1)  translate( 1%,  2%); } }

    .kb1 { animation: kb1 var(--kb-dur) ease-in-out both; }
    .kb2 { animation: kb2 var(--kb-dur) ease-in-out both; }
    .kb3 { animation: kb3 var(--kb-dur) ease-in-out both; }
    .kb4 { animation: kb4 var(--kb-dur) ease-in-out both; }
    .kb5 { animation: kb5 var(--kb-dur) ease-in-out both; }
    .kb6 { animation: kb6 var(--kb-dur) ease-in-out both; }

    /* ── Overlays ── */
    #overlay {
      position: fixed; inset: 0; z-index: 10;
      background: var(--overlay-gradient);
      pointer-events: none;
    }
    #night-veil {
      position: fixed; inset: 0; z-index: 90;
      background: rgba(0,0,0,0);
      transition: background 90s linear;
      pointer-events: none;
    }
    #night-veil.dimmed { background: rgba(0,0,0,0.65); }

    /* ── UI shell ── */
    #ui {
      position: fixed; inset: 0; z-index: 20;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 0 32px 36px;
    }

    #bottom-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 20px;
    }

    /* ── Clock block (left) ── */
    #clock-block { flex: 1; min-width: 0; }

    #time {
      font-size: clamp(68px, 13vw, 116px);
      font-weight: 200;
      letter-spacing: -2px;
      line-height: 1;
      text-shadow: 0 2px 24px rgba(0,0,0,0.6);
    }

    #date-line {
      margin-top: 5px;
      font-size: clamp(15px, 2.8vw, 20px);
      font-weight: 300;
      letter-spacing: 0.05em;
      color: var(--accent-dim);
      text-shadow: 0 1px 8px rgba(0,0,0,0.5);
    }

    /* ── Right panel ── */
    #right-panel {
      flex-shrink: 0;
      width: clamp(190px, 28vw, 256px);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* ── Mini month calendar ── */
    #calendar-block {
      background: var(--panel-bg);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-radius: 16px;
      padding: 14px 14px 12px;
      border: 1px solid var(--panel-border);
    }

    #cal-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 9px;
    }
    #cal-month {
      font-size: 12px; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--accent-dim);
    }
    #cal-year {
      font-size: 11px; font-weight: 400;
      color: var(--accent-faint);
    }
    #cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 1px;
      text-align: center;
    }
    .cal-dow {
      font-size: 8px; font-weight: 600;
      letter-spacing: 0.06em;
      color: var(--accent-faint);
      padding-bottom: 4px;
    }
    .cal-day {
      font-size: 11px; font-weight: 400;
      color: var(--accent-dim);
      line-height: 20px; height: 20px;
      border-radius: 50%;
    }
    .cal-day.empty    { color: transparent; }
    .cal-day.weekend  { color: rgba(255,255,255,0.38); }
    .cal-day.today    { background: var(--today-bg); color: var(--today-fg); font-weight: 700; }
    .cal-day.today.weekend { color: var(--today-fg); }
    .cal-day.has-event::after {
      content: '';
      display: block;
      width: 3px; height: 3px;
      border-radius: 50%;
      background: rgba(255,255,255,0.6);
      margin: -4px auto 0;
    }
    .cal-day.today.has-event::after { background: rgba(0,0,0,0.4); }

    /* ── Agenda block ── */
    #agenda-block {
      background: var(--panel-bg);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-radius: 16px;
      padding: 12px 14px;
      border: 1px solid var(--panel-border);
      display: none; /* shown once calendar loads */
    }

    #agenda-label {
      font-size: 9px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--accent-faint);
      margin-bottom: 8px;
    }

    .agenda-item {
      display: flex;
      gap: 8px;
      align-items: baseline;
      padding: 4px 0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .agenda-item:last-child { border-bottom: none; }

    .agenda-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: rgba(255,255,255,0.5);
      flex-shrink: 0;
      margin-top: 5px;
    }

    .agenda-time {
      font-size: 10px; font-weight: 500;
      color: var(--accent-faint);
      flex-shrink: 0;
      min-width: 44px;
      letter-spacing: 0.03em;
    }

    .agenda-title {
      font-size: 11px; font-weight: 400;
      color: var(--accent-dim);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .agenda-empty {
      font-size: 11px;
      color: var(--accent-faint);
      font-style: italic;
      padding: 2px 0;
    }

    /* ── Setup overlay ── */
    #setup-screen {
      position: fixed; inset: 0; z-index: 100;
      background: #111;
      display: none;
      flex-direction: column;
      align-items: center; justify-content: center;
      padding: 40px; text-align: center; gap: 18px;
    }
    #setup-screen h1 { font-size: 26px; font-weight: 300; }
    #setup-screen p  { font-size: 14px; color: rgba(255,255,255,0.5); line-height: 1.75; max-width: 500px; }
    #setup-screen code {
      background: rgba(255,255,255,0.08); border-radius: 5px;
      padding: 2px 7px; font-family: monospace; font-size: 12px; color: #7df;
    }
  </style>
</head>
<body>

  // ── PHOTOS ───────────────────────────────────────────────────────────────

  photos: [

    "https://picsum.photos/seed/mountain/1600/1200",
    "https://picsum.photos/seed/ocean/1600/1200",
    "https://picsum.photos/seed/valley/1600/1200",
    "https://picsum.photos/seed/sunrise/1600/1200",
    "https://picsum.photos/seed/lake/1600/1200",
  ],

  // ── CALENDAR / SCHEDULE ──────────────────────────────────────────────────
  //
  // Paste your calendar's secret ICS URL here. Works with Google Calendar,
  // Apple iCloud Calendar, Outlook, Fastmail — anything that exports ICS.
  //

  //   calendar.google.com → Settings → [pick a calendar] →
  //   scroll to "Secret address in iCal format" → copy that URL

  //   "Publish a calendar" → copy the ICS link
  //
  calendarICSUrl: "",   // ← paste your ICS URL between the quotes

  // How many upcoming days to show in the agenda (including today)
  agendaDays: 2,

  // Max events to show in the agenda panel
  agendaMaxItems: 5,

  // ── CLOCK ────────────────────────────────────────────────────────────────
  use12Hour:   true,   // false = 24-hour
  showSeconds: false,

  // ── TIMING ───────────────────────────────────────────────────────────────
  photoInterval:    25,   // seconds per photo
  kenburnsDuration: 28,   // seconds for Ken Burns pan (keep ≥ photoInterval)
  calendarRefresh:  15,   // minutes between calendar fetches

  // ── NIGHT DIM ────────────────────────────────────────────────────────────

  nightStart: 22,   // 10 PM
  nightEnd:    7,   //  7 AM

<div id="photo-a"></div>
<div id="photo-b"></div>
<div id="overlay"></div>
<div id="night-veil"></div>

<div id="ui">
  <div id="bottom-row">

    <div id="clock-block">
      <div id="time">00:00</div>
      <div id="date-line">Monday, January 1</div>
    </div>

    <div id="right-panel">
      <!-- Agenda (events from ICS) -->
      <div id="agenda-block">
        <div id="agenda-label">Today</div>
        <div id="agenda-list"></div>
      </div>

      <!-- Mini month calendar -->
      <div id="calendar-block">
        <div id="cal-header">
          <span id="cal-month">January</span>
          <span id="cal-year">2024</span>
        </div>
        <div id="cal-grid"></div>
      </div>
    </div>

  </div>
</div>

<div id="setup-screen">
  <h1>Smart Display</h1>
  <p>Open <code>index.html</code> and edit the <code>CONFIG</code> section at the top.<br>
  Add your photo filenames to <code>photos: [ ]</code>.<br>
  Optionally paste your ICS calendar URL into <code>calendarICSUrl</code>.</p>
  <p style="color:rgba(255,255,255,0.28);font-size:12px;">Clock and calendar are already working — this screen hides once photos are added.</p>
</div>


<script>
// ─────────────────────────────────────────────────────────────────────────────
// Helpers
// ─────────────────────────────────────────────────────────────────────────────

const $ = id => document.getElementById(id);
const KB = ['kb1','kb2','kb3','kb4','kb5','kb6'];
const MONTHS    = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS_S    = ['Su','Mo','Tu','We','Th','Fr','Sa'];
const DAYS_LONG = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const rand      = n => Math.floor(Math.random() * n);

function isSameDay(a, b) {
  return a.getFullYear() === b.getFullYear() &&
         a.getMonth()    === b.getMonth()    &&
         a.getDate()     === b.getDate();
}

function dateOnly(d) {
  return new Date(d.getFullYear(), d.getMonth(), d.getDate());
}

// ─────────────────────────────────────────────────────────────────────────────
// Clock
// ─────────────────────────────────────────────────────────────────────────────

function formatTime(d) {
  let h = d.getHours(), m = d.getMinutes(), s = d.getSeconds();
  if (CONFIG.use12Hour) h = h % 12 || 12;
  const mm = String(m).padStart(2,'0');
  const ss = String(s).padStart(2,'0');
  return CONFIG.showSeconds ? `${h}:${mm}:${ss}` : `${h}:${mm}`;
}

function updateClock() {
  const now = new Date();
  $('time').textContent     = formatTime(now);
  $('date-line').textContent = `${DAYS_LONG[now.getDay()]}, ${MONTHS[now.getMonth()]} ${now.getDate()}`;
}

// ─────────────────────────────────────────────────────────────────────────────
// Mini calendar
// ─────────────────────────────────────────────────────────────────────────────

let eventDaysSet = new Set(); // filled by ICS parser, "YYYY-M-D" strings

function buildCalendar() {
  const now   = new Date();
  const year  = now.getFullYear();
  const month = now.getMonth();
  const today = now.getDate();

  $('cal-month').textContent = MONTHS[month].toUpperCase();
  $('cal-year').textContent  = year;

  const firstDow    = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const grid        = $('cal-grid');
  grid.innerHTML    = '';

  DAYS_S.forEach(d => {
    const el = document.createElement('div');
    el.className = 'cal-dow'; el.textContent = d; grid.appendChild(el);
  });

  for (let i = 0; i < firstDow; i++) {
    const el = document.createElement('div'); el.className = 'cal-day empty'; grid.appendChild(el);
  }

  for (let day = 1; day <= daysInMonth; day++) {
    const el  = document.createElement('div');
    const dow = (firstDow + day - 1) % 7;
    const key = `${year}-${month}-${day}`;
    let cls = 'cal-day';
    if (day === today)          cls += ' today';
    if (dow === 0 || dow === 6) cls += ' weekend';
    if (eventDaysSet.has(key))  cls += ' has-event';
    el.className = cls; el.textContent = day; grid.appendChild(el);
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// ICS parser
// ─────────────────────────────────────────────────────────────────────────────

function parseICSDate(val, propLine) {
  // val examples: 20260629, 20260629T140000, 20260629T140000Z
  // propLine: DTSTART;TZID=America/New_York  (we parse the raw value only)
  val = val.trim();
  const allDay = val.length === 8;
  if (allDay) {
    const y = +val.slice(0,4), mo = +val.slice(4,6)-1, d = +val.slice(6,8);
    return { date: new Date(y, mo, d), allDay: true };
  }
  const y  = +val.slice(0,4), mo = +val.slice(4,6)-1, d  = +val.slice(6,8);
  const hh = +val.slice(9,11), mm = +val.slice(11,13), ss = +val.slice(13,15);
  const utc = val.endsWith('Z');
  const date = utc
    ? new Date(Date.UTC(y, mo, d, hh, mm, ss))
    : new Date(y, mo, d, hh, mm, ss);
  return { date, allDay: false };
}

function parseICS(text) {
  // Unfold continuation lines (RFC 5545 §3.1)
  text = text.replace(/\r\n[ \t]/g, '').replace(/\r\n/g, '\n').replace(/\r/g, '\n');

  const events = [];
  let ev = null;

  for (const rawLine of text.split('\n')) {
    const line = rawLine.trim();
    if (line === 'BEGIN:VEVENT') { ev = {}; continue; }
    if (line === 'END:VEVENT')   { if (ev && ev.start) events.push(ev); ev = null; continue; }
    if (!ev) continue;

    const colon = line.indexOf(':');
    if (colon === -1) continue;
    const propFull = line.slice(0, colon);
    const propKey  = propFull.split(';')[0].toUpperCase();
    const val      = line.slice(colon + 1);

    switch (propKey) {
      case 'SUMMARY':     ev.title  = val.replace(/\\,/g,',').replace(/\\n/g,' ').trim(); break;
      case 'DESCRIPTION': ev.desc   = val.replace(/\\n/g,'\n').replace(/\\,/g,',').trim(); break;
      case 'LOCATION':    ev.loc    = val.replace(/\\,/g,',').trim(); break;
      case 'DTSTART':     ev.start  = parseICSDate(val, propFull); break;
      case 'DTEND':       ev.end    = parseICSDate(val, propFull); break;
      case 'STATUS':      ev.status = val.trim(); break;
      case 'RRULE':       ev.rrule  = val.trim(); break;
    }
  }

  return events;
}

// Very basic RRULE expansion — handles FREQ=DAILY/WEEKLY/MONTHLY, COUNT, UNTIL
// Enough for most common recurring meetings; complex rules are skipped.
function expandRecurring(ev, windowStart, windowEnd) {
  if (!ev.rrule) return [ev];
  const parts = {};
  ev.rrule.split(';').forEach(p => { const [k,v] = p.split('='); parts[k] = v; });
  const freq = parts['FREQ'];
  if (!freq) return [ev];

  const count = parts['COUNT'] ? +parts['COUNT'] : 500;
  let until   = parts['UNTIL'] ? parseICSDate(parts['UNTIL'], '').date : null;
  const byday = (parts['BYDAY'] || '').split(',').filter(Boolean);

  const MS_DAY  = 86400000;
  const MS_WEEK = 7 * MS_DAY;
  const instances = [];
  let cursor = new Date(ev.start.date);
  const duration = ev.end ? (ev.end.date - ev.start.date) : 0;
  let n = 0;

  while (n < count) {
    if (until && cursor > until) break;
    if (cursor > windowEnd)      break;

    const inWindow = cursor >= windowStart || (ev.end && new Date(cursor.getTime() + duration) > windowStart);

    if (inWindow) {
      // Filter by BYDAY if specified
      const dow = ['SU','MO','TU','WE','TH','FR','SA'][cursor.getDay()];
      if (!byday.length || byday.some(b => b.includes(dow))) {
        instances.push({
          ...ev,
          start: { date: new Date(cursor), allDay: ev.start.allDay },
          end:   ev.end ? { date: new Date(cursor.getTime() + duration), allDay: ev.end.allDay } : undefined,
        });
      }
    }

    // Advance cursor
    if (freq === 'DAILY')        cursor = new Date(cursor.getTime() + MS_DAY);
    else if (freq === 'WEEKLY')  cursor = new Date(cursor.getTime() + MS_WEEK);
    else if (freq === 'MONTHLY') cursor = new Date(cursor.getFullYear(), cursor.getMonth() + 1, cursor.getDate());
    else if (freq === 'YEARLY')  cursor = new Date(cursor.getFullYear() + 1, cursor.getMonth(), cursor.getDate());
    else break;

    n++;
  }

  return instances;
}

// ─────────────────────────────────────────────────────────────────────────────
// Agenda rendering
// ─────────────────────────────────────────────────────────────────────────────

function fmtEventTime(dt, allDay) {
  if (allDay) return 'All day';
  let h = dt.getHours(), m = dt.getMinutes();
  const suffix = CONFIG.use12Hour ? (h < 12 ? 'am' : 'pm') : '';
  if (CONFIG.use12Hour) h = h % 12 || 12;
  return `${h}:${String(m).padStart(2,'0')}${suffix}`;
}

let allParsedEvents = [];

function renderAgenda() {
  const now   = new Date();
  const today = dateOnly(now);

  // Build window: today + agendaDays
  const windowEnd = new Date(today.getTime() + CONFIG.agendaDays * 86400000);

  // Expand recurring events within window
  let expanded = [];
  for (const ev of allParsedEvents) {
    if (ev.status === 'CANCELLED') continue;
    if (ev.rrule) {
      expanded.push(...expandRecurring(ev, today, windowEnd));
    } else {
      expanded.push(ev);
    }
  }

  // Filter to window and sort
  expanded = expanded
    .filter(ev => {
      const s = ev.start.date;
      const e = ev.end ? ev.end.date : s;
      return e >= today && s < windowEnd;
    })
    .sort((a, b) => a.start.date - b.start.date);

  // Dot markers on calendar
  eventDaysSet = new Set();
  expanded.forEach(ev => {
    const d = ev.start.date;
    eventDaysSet.add(`${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`);
  });
  buildCalendar();

  // Agenda items
  const todayEvents    = expanded.filter(ev => isSameDay(ev.start.date, today) || (ev.start.allDay && ev.start.date <= today && (!ev.end || ev.end.date > today)));
  const tomorrowEvents = expanded.filter(ev => {
    const tom = new Date(today.getTime() + 86400000);
    return isSameDay(ev.start.date, tom);
  });

  const displayEvents = todayEvents.length > 0 ? todayEvents : tomorrowEvents;
  const label = todayEvents.length > 0
    ? 'Today'
    : (() => { const t = new Date(today.getTime() + 86400000); return DAYS_LONG[t.getDay()]; })();

  $('agenda-label').textContent = label;

  const list = $('agenda-list');
  list.innerHTML = '';

  if (displayEvents.length === 0) {
    const el = document.createElement('div');
    el.className = 'agenda-empty'; el.textContent = 'No events'; list.appendChild(el);
  } else {
    const slice = displayEvents.slice(0, CONFIG.agendaMaxItems);
    slice.forEach(ev => {
      const row = document.createElement('div'); row.className = 'agenda-item';
      const dot = document.createElement('div'); dot.className = 'agenda-dot';
      const time = document.createElement('div'); time.className = 'agenda-time';
      time.textContent = fmtEventTime(ev.start.date, ev.start.allDay);
      const title = document.createElement('div'); title.className = 'agenda-title';
      title.textContent = ev.title || '(No title)';
      row.appendChild(dot); row.appendChild(time); row.appendChild(title);
      list.appendChild(row);
    });
    if (displayEvents.length > CONFIG.agendaMaxItems) {
      const more = document.createElement('div');
      more.className = 'agenda-empty';
      more.textContent = `+${displayEvents.length - CONFIG.agendaMaxItems} more`;
      list.appendChild(more);
    }
  }

  $('agenda-block').style.display = 'block';
}

// ─────────────────────────────────────────────────────────────────────────────
// ICS fetch (with CORS proxy fallback)
// ─────────────────────────────────────────────────────────────────────────────

const CORS_PROXIES = [
  url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
];

async function fetchICS() {
  const url = (CONFIG.calendarICSUrl || '').trim();
  if (!url) return;

  for (const proxy of CORS_PROXIES) {
    try {
      const res = await fetch(proxy(url), { cache: 'no-store' });
      if (!res.ok) continue;
      const text = await res.text();
      if (!text.includes('BEGIN:VCALENDAR')) continue;
      allParsedEvents = parseICS(text);
      renderAgenda();
      return;
    } catch (_) {}
  }
  // If both proxies fail, still show the agenda panel with whatever we have
  renderAgenda();
}

// ─────────────────────────────────────────────────────────────────────────────
// Slideshow
// ─────────────────────────────────────────────────────────────────────────────

const photos  = CONFIG.photos.filter(Boolean);
let layerA    = $('photo-a');
let layerB    = $('photo-b');
let activeL   = layerA, inactiveL = layerB;
let photoIdx  = 0, transitioning = false;

function applyKB(el) {
  KB.forEach(c => el.classList.remove(c));
  el.style.setProperty('--kb-dur', CONFIG.kenburnsDuration + 's');
  void el.offsetWidth;
  el.classList.add(KB[rand(KB.length)]);
}

function setPhoto(el, url) { el.style.backgroundImage = `url(${JSON.stringify(url)})`; }

function showNext() {
  if (transitioning || photos.length === 0) return;
  transitioning = true;
  photoIdx = (photoIdx + 1) % photos.length;
  setPhoto(inactiveL, photos[photoIdx]);
  applyKB(inactiveL);
  setTimeout(() => {
    inactiveL.style.opacity = '1';
    activeL.style.opacity   = '0';
    setTimeout(() => { [activeL, inactiveL] = [inactiveL, activeL]; transitioning = false; }, 2600);
  }, 200);
}

function initSlideshow() {
  if (photos.length === 0) { $('setup-screen').style.display = 'flex'; return; }
  setPhoto(layerA, photos[0]); applyKB(layerA);
  layerA.style.opacity = '1'; layerB.style.opacity = '0';
  activeL = layerA; inactiveL = layerB;
  if (photos.length > 1) setPhoto(layerB, photos[1]);
  setInterval(showNext, CONFIG.photoInterval * 1000);
}

// ─────────────────────────────────────────────────────────────────────────────
// Night dim
// ─────────────────────────────────────────────────────────────────────────────

function updateNightDim() {
  if (!CONFIG.nightDim) return;
  const h = new Date().getHours();
  const dark = h >= CONFIG.nightStart || h < CONFIG.nightEnd;
  $('night-veil').classList.toggle('dimmed', dark);
}

// ─────────────────────────────────────────────────────────────────────────────
// Midnight refresh
// ─────────────────────────────────────────────────────────────────────────────

function scheduleMidnightRefresh() {
  const now  = new Date();
  const next = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1);
  setTimeout(() => { buildCalendar(); renderAgenda(); scheduleMidnightRefresh(); }, next - now);
}

// ─────────────────────────────────────────────────────────────────────────────
// Wake lock
// ─────────────────────────────────────────────────────────────────────────────

async function requestWakeLock() {
  try { if ('wakeLock' in navigator) await navigator.wakeLock.request('screen'); } catch (_) {}
}
requestWakeLock();
document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'visible') requestWakeLock(); });

// ─────────────────────────────────────────────────────────────────────────────
// Boot
// ─────────────────────────────────────────────────────────────────────────────

updateClock();
setInterval(updateClock, 1000);

buildCalendar();
scheduleMidnightRefresh();

updateNightDim();
setInterval(updateNightDim, 60_000);

initSlideshow();

// Calendar: fetch now and on interval
if (CONFIG.calendarICSUrl) {
  fetchICS();
  setInterval(fetchICS, CONFIG.calendarRefresh * 60_000);
}

document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
</script>
</body>
</html>
