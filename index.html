<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Smart Display">
  <title>Smart Display</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
      -webkit-font-smoothing: antialiased;
      color: #fff;
      cursor: none;
      user-select: none;
      -webkit-user-select: none;
    }

    /* ── Background photo ── */
    #photo-bg {
      position: fixed; inset: -5%;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      transition: opacity 2s ease-in-out;
      will-change: transform;
    }
    @keyframes kb { from { transform: scale(1.08) translate(1%,1%); } to { transform: scale(1) translate(-1%,-1%); } }
    #photo-bg.animate { animation: kb 40s ease-in-out infinite alternate; }

    /* ── Overlay ── */
    #overlay {
      position: fixed; inset: 0; z-index: 5;
      background: rgba(0,0,0,0.45);
      pointer-events: none;
    }

    /* ── Night veil ── */
    #night-veil {
      position: fixed; inset: 0; z-index: 8;
      background: rgba(0,0,0,0);
      transition: background 90s linear;
      pointer-events: none;
    }
    #night-veil.dimmed { background: rgba(0,0,0,0.6); }

    /* ── Full UI ── */
    #ui {
      position: fixed; inset: 0; z-index: 10;
      display: flex;
      flex-direction: column;
      padding: 18px 18px 14px;
    }

    /* ── Month nav header ── */
    #month-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      margin-bottom: 10px;
    }

    .nav-btn {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: rgba(255,255,255,0.12);
      border: none; cursor: pointer; color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; line-height: 1;
      transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .nav-btn:active { background: rgba(255,255,255,0.25); }

    #month-title {
      font-size: clamp(18px, 4vw, 28px);
      font-weight: 200;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-align: center;
      flex: 1;
      text-shadow: 0 1px 12px rgba(0,0,0,0.5);
    }

    /* ── Day-of-week header ── */
    #dow-header {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 3px;
      flex-shrink: 0;
      margin-bottom: 3px;
    }

    .dow-label {
      text-align: center;
      font-size: clamp(8px, 1.4vw, 11px);
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      padding-bottom: 4px;
    }
    .dow-label.weekend { color: rgba(255,255,255,0.22); }

    /* ── Calendar grid ── */
    #cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 3px;
      flex: 1;
      min-height: 0;
    }

    /* ── Day cell ── */
    .day-cell {
      background: rgba(0,0,0,0.28);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 7px;
      padding: 5px 5px 4px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 2px;
      transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .day-cell.other-month {
      background: rgba(0,0,0,0.12);
      border-color: rgba(255,255,255,0.03);
    }
    .day-cell.other-month .day-num { color: rgba(255,255,255,0.2); }

    .day-cell.today {
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.3);
    }

    .day-cell.weekend:not(.other-month) .day-num { color: rgba(255,255,255,0.5); }

    .day-num-wrap {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      line-height: 1;
    }

    .day-num {
      font-size: clamp(10px, 2vw, 15px);
      font-weight: 400;
      color: rgba(255,255,255,0.75);
      line-height: 1;
    }

    .day-cell.today .day-num {
      display: inline-flex;
      align-items: center; justify-content: center;
      width: clamp(18px, 3.2vw, 24px);
      height: clamp(18px, 3.2vw, 24px);
      background: #fff;
      color: #111;
      border-radius: 50%;
      font-weight: 700;
      font-size: clamp(9px, 1.8vw, 13px);
    }

    /* ── Event pills ── */
    .event-pill {
      flex-shrink: 0;
      font-size: clamp(7px, 1.1vw, 9px);
      line-height: 1.3;
      color: rgba(255,255,255,0.82);
      background: rgba(255,255,255,0.14);
      border-radius: 3px;
      padding: 1px 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .event-pill.timed::before {
      content: attr(data-time) ' ';
      color: rgba(255,255,255,0.45);
      font-size: 0.85em;
    }

    .event-more {
      font-size: clamp(6px, 1vw, 8px);
      color: rgba(255,255,255,0.35);
      padding: 0 2px;
      flex-shrink: 0;
    }

    /* ── Bottom bar ── */
    #bottom-bar {
      flex-shrink: 0;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-top: 10px;
    }

    #date-block {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    #day-name {
      font-size: clamp(10px, 2vw, 14px);
      font-weight: 400;
      color: rgba(255,255,255,0.45);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    #date-full {
      font-size: clamp(14px, 2.8vw, 20px);
      font-weight: 300;
      color: rgba(255,255,255,0.75);
    }

    #time {
      font-size: clamp(32px, 7vw, 56px);
      font-weight: 200;
      letter-spacing: -1px;
      line-height: 1;
      text-shadow: 0 2px 16px rgba(0,0,0,0.5);
    }

    /* ── Swipe hint (fades after first use) ── */
    #swipe-hint {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
      z-index: 20;
      font-size: 11px; color: rgba(255,255,255,0.3);
      letter-spacing: 0.1em;
      pointer-events: none;
      transition: opacity 1s;
    }
    #swipe-hint.hidden { opacity: 0; }
  </style>
</head>

  calendarURLs: [
    "https://p174-caldav.icloud.com/published/2/ODE0NjEwMDM3NTgxNDYxMPAkPSus1Y5N3q3NZbzfB9pYPflaVpFJPsNjuZXOhOMguh_AvXoQZp9Cf6pK_jZXnm58SdYmsgnKqDeAFscKfyw

<div id="photo-bg"></div>
<div id="overlay"></div>
<div id="night-veil"></div>

<div id="ui">
  <div id="month-nav">
    <button class="nav-btn" id="btn-prev" onclick="shiftMonth(-1)">‹</button>
    <div id="month-title">June 2026</div>
    <button class="nav-btn" id="btn-next" onclick="shiftMonth(1)">›</button>
  </div>

  <div id="dow-header">
    <div class="dow-label weekend">Su</div>
    <div class="dow-label">Mo</div>

    <div class="dow-label">We</div>
    <div class="dow-label">Th</div>

<div id="swipe-hint">← swipe to change month →</div>

<script>
// ─── Helpers ──────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const MONTHS    = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS_LONG = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const IMAGE_EXT = /\.(jpe?g|png|gif|webp|avif|heic)$/i;
const CORS_PROXIES = [
  u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
  u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
];

// ─── Clock ────────────────────────────────────────────────────────────────
function formatTime(d) {
  let h = d.getHours(), m = d.getMinutes(), s = d.getSeconds();
  if (CONFIG.use12Hour) h = h % 12 || 12;
  const mm = String(m).padStart(2,'0');
  return CONFIG.showSeconds ? `${h}:${mm}:${String(s).padStart(2,'0')}` : `${h}:${mm}`;
}

function updateClock() {
  const now = new Date();
  $('time').textContent    = formatTime(now);
  $('day-name').textContent  = DAYS_LONG[now.getDay()].toUpperCase();
  $('date-full').textContent = `${MONTHS[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()}`;
}

// ─── Calendar rendering ───────────────────────────────────────────────────
let viewOffset = 0;   // months from current month; 0 = today's month

function shiftMonth(delta) {
  viewOffset += delta;
  renderCalendar();
  hideSwipeHint();
}

function eventTimeLabel(ev) {
  if (ev.start.allDay) return null;
  const d = ev.start.date;
  let h = d.getHours(), m = d.getMinutes();
  const suffix = CONFIG.use12Hour ? (h < 12 ? 'a' : 'p') : '';
  if (CONFIG.use12Hour) h = h % 12 || 12;
  return m === 0 ? `${h}${suffix}` : `${h}:${String(m).padStart(2,'0')}${suffix}`;
}

function renderCalendar() {
  const now    = new Date();
  const base   = new Date(now.getFullYear(), now.getMonth() + viewOffset, 1);
  const year   = base.getFullYear();
  const month  = base.getMonth();
  const today  = now.getDate();
  const isThisMonth = viewOffset === 0;

  $('month-title').textContent = `${MONTHS[month]} ${year}`;

  const firstDow    = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const prevDays    = new Date(year, month, 0).getDate();

  // How many total cells (always 6 rows = 42 cells so grid is stable)
  const TOTAL_CELLS = 42;

  // Build event lookup: key "YYYY-M-D" → sorted array of events
  const eventMap = buildEventMap(year, month);

  const grid = $('cal-grid');
  grid.innerHTML = '';

  // How many rows we actually need (5 or 6)
  const weeksNeeded = Math.ceil((firstDow + daysInMonth) / 7);
  grid.style.gridTemplateRows = `repeat(${weeksNeeded}, 1fr)`;

  const totalCells = weeksNeeded * 7;

  for (let i = 0; i < totalCells; i++) {
    const cell = document.createElement('div');
    cell.className = 'day-cell';

    let dayNum, cellMonth = month, cellYear = year, isOther = false;

    if (i < firstDow) {
      // Previous month overflow
      dayNum = prevDays - firstDow + i + 1;
      cellMonth = month - 1 < 0 ? 11 : month - 1;
      cellYear  = month - 1 < 0 ? year - 1 : year;
      isOther   = true;
      cell.classList.add('other-month');
    } else if (i - firstDow < daysInMonth) {
      dayNum = i - firstDow + 1;
      if (isThisMonth && dayNum === today) cell.classList.add('today');
      const dow = i % 7;
      if (dow === 0 || dow === 6) cell.classList.add('weekend');
    } else {
      // Next month overflow
      dayNum = i - firstDow - daysInMonth + 1;
      cellMonth = month + 1 > 11 ? 0 : month + 1;
      cellYear  = month + 1 > 11 ? year + 1 : year;
      isOther   = true;
      cell.classList.add('other-month');
    }

    // Day number
    const numWrap = document.createElement('div'); numWrap.className = 'day-num-wrap';
    const numEl   = document.createElement('div'); numEl.className = 'day-num';
    numEl.textContent = dayNum;
    numWrap.appendChild(numEl);
    cell.appendChild(numWrap);

    // Events for this cell
    if (!isOther) {
      const key    = `${year}-${month}-${dayNum}`;
      const events = eventMap[key] || [];

      // How many pills fit: estimate based on cell — show max 3, then "+N more"
      const MAX_PILLS = 3;
      const visible   = events.slice(0, MAX_PILLS);
      const overflow  = events.length - visible.length;

      visible.forEach(ev => {
        const pill = document.createElement('div');
        const t    = eventTimeLabel(ev);
        if (t) {
          pill.className = 'event-pill timed';
          pill.setAttribute('data-time', t);
        } else {
          pill.className = 'event-pill';
        }
        pill.textContent = ev.title || '(No title)';
        cell.appendChild(pill);
      });

      if (overflow > 0) {
        const more = document.createElement('div');
        more.className = 'event-more';
        more.textContent = `+${overflow} more`;
        cell.appendChild(more);
      }
    }

    grid.appendChild(cell);
  }
}

// Build a map of "year-month-day" → [events] for the given month
function buildEventMap(year, month) {
  const map = {};
  const monthStart = new Date(year, month, 1);
  const monthEnd   = new Date(year, month + 1, 0, 23, 59, 59);

  for (const ev of allEvents) {
    if (ev.status === 'CANCELLED') continue;
    const instances = ev.rrule
      ? expandRecurring(ev, monthStart, monthEnd)
      : [ev];

    for (const inst of instances) {
      const d = inst.start.date;
      if (d < monthStart || d > monthEnd) continue;
      const key = `${year}-${month}-${d.getDate()}`;
      if (!map[key]) map[key] = [];
      map[key].push(inst);
    }
  }

  // Sort events within each day by start time
  for (const key of Object.keys(map)) {
    map[key].sort((a,b) => {
      if (a.start.allDay && !b.start.allDay) return -1;
      if (!a.start.allDay && b.start.allDay) return 1;
      return a.start.date - b.start.date;
    });
  }

  return map;
}

// ─── ICS parser ───────────────────────────────────────────────────────────
let allEvents = [];

function parseICSDate(val) {
  val = val.trim();
  if (val.length === 8) {
    return { date: new Date(+val.slice(0,4), +val.slice(4,6)-1, +val.slice(6,8)), allDay: true };
  }
  const y=+val.slice(0,4), mo=+val.slice(4,6)-1, d=+val.slice(6,8);
  const h=+val.slice(9,11), m=+val.slice(11,13), s=+val.slice(13,15);
  const date = val.endsWith('Z')
    ? new Date(Date.UTC(y,mo,d,h,m,s))
    : new Date(y,mo,d,h,m,s);
  return { date, allDay: false };
}

function parseICS(text) {
  text = text.replace(/\r\n[ \t]/g,'').replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  const events = [];
  let ev = null;
  for (const line of text.split('\n')) {
    if (line === 'BEGIN:VEVENT') { ev = {}; continue; }
    if (line === 'END:VEVENT')   { if (ev?.start) events.push(ev); ev = null; continue; }
    if (!ev) continue;
    const ci = line.indexOf(':');
    if (ci === -1) continue;
    const key = line.slice(0,ci).split(';')[0].toUpperCase();
    const val = line.slice(ci+1);
    if (key==='SUMMARY')  ev.title  = val.replace(/\\,/g,',').replace(/\\n/g,' ').trim();
    if (key==='DTSTART')  ev.start  = parseICSDate(val);
    if (key==='DTEND')    ev.end    = parseICSDate(val);
    if (key==='STATUS')   ev.status = val.trim();
    if (key==='RRULE')    ev.rrule  = val.trim();
  }
  return events;
}

function expandRecurring(ev, winStart, winEnd) {
  const parts = {};
  ev.rrule.split(';').forEach(p => { const [k,v] = p.split('='); parts[k]=v; });
  const freq = parts['FREQ'];
  if (!freq) return [];

  const count  = parts['COUNT'] ? +parts['COUNT'] : 500;
  const until  = parts['UNTIL'] ? parseICSDate(parts['UNTIL']).date : null;
  const byday  = (parts['BYDAY']||'').split(',').filter(Boolean);
  const DOW    = ['SU','MO','TU','WE','TH','FR','SA'];
  const dur    = ev.end ? ev.end.date - ev.start.date : 0;
  const MS_DAY = 86400000;

  const instances = [];
  let cursor = new Date(ev.start.date);
  let n = 0;

  while (n < count) {
    if (until && cursor > until) break;
    if (cursor > winEnd) break;

    if (cursor >= winStart || (dur && new Date(cursor.getTime()+dur) > winStart)) {
      const dow = DOW[cursor.getDay()];
      if (!byday.length || byday.some(b => b.includes(dow))) {
        instances.push({
          ...ev,
          start: { date: new Date(cursor), allDay: ev.start.allDay },
          end:   ev.end ? { date: new Date(cursor.getTime()+dur), allDay: ev.end.allDay } : undefined,
        });
      }
    }

    if      (freq==='DAILY')   cursor = new Date(cursor.getTime()+MS_DAY);
    else if (freq==='WEEKLY')  cursor = new Date(cursor.getTime()+7*MS_DAY);
    else if (freq==='MONTHLY') cursor = new Date(cursor.getFullYear(), cursor.getMonth()+1, cursor.getDate());
    else if (freq==='YEARLY')  cursor = new Date(cursor.getFullYear()+1, cursor.getMonth(), cursor.getDate());
    else break;
    n++;
  }
  return instances;
}

async function fetchCalendars() {
  const urls = CONFIG.calendarURLs.filter(Boolean);
  if (!urls.length) return;

  const fetched = [];
  for (const url of urls) {
    for (const proxy of CORS_PROXIES) {
      try {
        const res  = await fetch(proxy(url), { cache: 'no-store' });
        if (!res.ok) continue;
        const text = await res.text();
        if (!text.includes('BEGIN:VCALENDAR')) continue;
        fetched.push(...parseICS(text));
        break;
      } catch (_) {}
    }
  }

  allEvents = fetched;
  renderCalendar();
}

// ─── Photos ───────────────────────────────────────────────────────────────
let photos = [...CONFIG.photos];
let photoIdx = 0;

function setPhoto(url) {
  const bg = $('photo-bg');
  bg.style.backgroundImage = `url(${JSON.stringify(url)})`;
  if (!bg.classList.contains('animate')) {
    setTimeout(() => bg.classList.add('animate'), 100);
  }
}

function nextPhoto() {
  if (!photos.length) return;
  photoIdx = (photoIdx + 1) % photos.length;
  setPhoto(photos[photoIdx]);
}

async function initPhotos() {
  // Fetch file list from GitHub
  const repo   = (CONFIG.githubRepo   || '').trim();
  const folder = (CONFIG.photosFolder || 'photos').trim();
  if (repo) {
    try {
      const res   = await fetch(`https://api.github.com/repos/${repo}/contents/${folder}`, {
        headers: { Accept: 'application/vnd.github.v3+json' },
      });
      if (res.ok) {
        const files = await res.json();
        if (Array.isArray(files)) {
          const urls = files.filter(f => f.type==='file' && IMAGE_EXT.test(f.name)).map(f => f.download_url);
          photos = [...urls, ...CONFIG.photos.filter(Boolean)];
        }
      }
    } catch (_) {}
  }

  if (!photos.length) return;

  // Shuffle
  for (let i = photos.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [photos[i],photos[j]] = [photos[j],photos[i]];
  }

  setPhoto(photos[0]);
  if (photos.length > 1) setInterval(nextPhoto, CONFIG.photoInterval * 1000);
}

// ─── Night dim ────────────────────────────────────────────────────────────
function updateNightDim() {
  if (!CONFIG.nightDim) return;
  const h = new Date().getHours();
  $('night-veil').classList.toggle('dimmed', h >= CONFIG.nightStart || h < CONFIG.nightEnd);
}

// ─── Swipe detection ──────────────────────────────────────────────────────
let touchStartX = null, touchStartY = null;

document.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });

document.addEventListener('touchend', e => {
  if (touchStartX === null) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 1.5) {
    shiftMonth(dx < 0 ? 1 : -1);
  }
  touchStartX = touchStartY = null;
}, { passive: true });

// ─── Swipe hint ───────────────────────────────────────────────────────────
let swipeHintHidden = false;
function hideSwipeHint() {
  if (swipeHintHidden) return;
  swipeHintHidden = true;
  $('swipe-hint').classList.add('hidden');
}
setTimeout(hideSwipeHint, 6000); // auto-hide after 6 seconds

// ─── Midnight auto-advance ────────────────────────────────────────────────
function scheduleMidnight() {
  const now  = new Date();
  const next = new Date(now.getFullYear(), now.getMonth(), now.getDate()+1);
  setTimeout(() => {
    // If user is viewing current month, re-render so "today" highlight moves
    if (viewOffset === 0) renderCalendar();
    scheduleMidnight();
  }, next - now);
}

// ─── Wake lock ────────────────────────────────────────────────────────────
async function requestWakeLock() {
  try { if ('wakeLock' in navigator) await navigator.wakeLock.request('screen'); } catch(_) {}
}
requestWakeLock();
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') requestWakeLock();
});

// ─── Boot ─────────────────────────────────────────────────────────────────
updateClock();
setInterval(updateClock, 1000);

renderCalendar();
scheduleMidnight();

updateNightDim();
setInterval(updateNightDim, 60_000);

initPhotos();

if (CONFIG.calendarURLs.filter(Boolean).length) {
  fetchCalendars();
  setInterval(fetchCalendars, CONFIG.calendarRefresh * 60_000);
}
</script>
</body>
