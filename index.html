<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Calendar">
  <title>Calendar</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --surface:   #1c1f2b;
      --border:    rgba(255,255,255,0.09);
      --text:      rgba(255,255,255,0.85);
      --text-dim:  rgba(255,255,255,0.38);
      --text-faint:rgba(255,255,255,0.18);
      --today-bg:  #ffffff;
      --today-fg:  #0f1117;
      --accent:    #5b8dee;
      --header-h:  64px;
      --dow-h:     28px;
      --footer-h:  62px;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }

    /* ── Header ── */
    #header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--header-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      z-index: 10;
    }

    .nav-btn {
      width: 40px; height: 40px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 20px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s;
    }
    .nav-btn:active { background: rgba(255,255,255,0.15); }

    #month-title {
      font-size: clamp(20px, 5vw, 30px);
      font-weight: 200;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    #today-btn {
      font-size: 12px;
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-dim);
      cursor: pointer;
      letter-spacing: 0.04em;
      -webkit-tap-highlight-color: transparent;
    }
    #today-btn:active { background: rgba(255,255,255,0.12); color: var(--text); }

    /* ── Day-of-week row ── */
    #dow-row {
      position: fixed;
      top: var(--header-h);
      left: 0; right: 0;
      height: var(--dow-h);
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      padding: 0 12px;
      align-items: center;
      background: var(--bg);
      z-index: 10;
      border-bottom: 1px solid var(--border);
    }

    .dow-label {
      text-align: center;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-faint);
    }
    .dow-label.we { color: rgba(255,100,100,0.45); }

    /* ── Calendar grid ── */
    #cal-grid {
      position: fixed;
      top: calc(var(--header-h) + var(--dow-h));
      left: 0; right: 0;
      bottom: var(--footer-h);
      padding: 8px 12px;
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      /* rows set dynamically */
      gap: 6px;
      overflow: hidden;
    }

    /* ── Day cell ── */
    .day {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 7px 7px 5px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 3px;
      min-height: 0;
    }

    .day.other { background: transparent; border-color: transparent; }
    .day.other .day-n { color: var(--text-faint); }

    .day.today { border-color: var(--accent); background: rgba(91,141,238,0.08); }

    .day.weekend .day-n { color: rgba(255,255,255,0.42); }
    .day.today .day-n-wrap .day-n { color: var(--today-fg); }

    .day-n-wrap { flex-shrink: 0; }

    .day-n {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 24px; height: 24px;
      font-size: 13px;
      font-weight: 400;
      color: var(--text);
      border-radius: 50%;
      line-height: 1;
    }

    .day.today .day-n {
      background: var(--today-bg);
      color: var(--today-fg);
      font-weight: 700;
    }

    /* ── Events inside a cell ── */
    .ev {
      flex-shrink: 0;
      font-size: 10px;
      line-height: 1.35;
      border-radius: 4px;
      padding: 1px 5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      background: rgba(91,141,238,0.22);
      color: rgba(255,255,255,0.78);
    }
    .ev.allday { background: rgba(91,141,238,0.32); }
    .ev-time { color: rgba(255,255,255,0.38); font-size: 9px; margin-right: 3px; }
    .ev-more { font-size: 9px; color: var(--text-faint); padding: 0 3px; flex-shrink: 0; }

    /* ── Footer ── */
    #footer {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: var(--footer-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      border-top: 1px solid var(--border);
      background: var(--bg);
      z-index: 10;
    }

    #date-block { display: flex; flex-direction: column; gap: 1px; }
    #day-name  { font-size: 11px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-faint); }
    #date-full { font-size: 16px; font-weight: 300; color: var(--text-dim); }

    #clock { font-size: 38px; font-weight: 200; letter-spacing: -0.5px; color: var(--text); }

    /* ── Setup banner ── */
    #setup-banner {
      position: fixed;
      bottom: var(--footer-h);
      left: 0; right: 0;
      padding: 10px 20px;
      background: rgba(91,141,238,0.12);
      border-top: 1px solid rgba(91,141,238,0.25);
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      text-align: center;
      z-index: 9;
      display: none;
    }

    /* ── Cal status indicator ── */
    #cal-status {
      font-size: 10px;
      color: var(--text-faint);
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>

<!--
  ╔══════════════════════════════════════════════════════════╗
  ║  CONFIGURATION — only edit this block                   ║
  ╚══════════════════════════════════════════════════════════╝

  HOW TO GET YOUR APPLE CALENDAR ICS URL:
  1. Open Calendar app on your Mac
  2. Right-click any calendar in the left sidebar
  3. Choose "Share Calendar..."
  4. Tick "Public Calendar"
  5. Click "Copy Link" — you'll get a webcal:// URL
  6. Change  webcal://  →  https://  and paste it below

  You can add multiple calendars (one per line, comma-separated).
-->
<script>
const CONFIG = {
  calendarURLs: [
    "https://p174-caldav.icloud.com/published/2/ODE0NjEwMDM3NTgxNDYxMPAkPSus1Y5N3q3NZbzfB9pYPflaVpFJPsNjuZXOhOMguh_AvXoQZp9Cf6pK_jZXnm58SdYmsgnKqDeAFscKfyw"
  ],

  refreshMinutes: 15,   // how often to re-fetch the calendar
  use12Hour: true,      // false = 24-hour clock
};
</script>
<!-- ══════════════════════════════════════════════════════ -->

<div id="header">
  <button class="nav-btn" onclick="go(-1)" aria-label="Previous month">‹</button>
  <div id="month-title">—</div>
  <button class="nav-btn" onclick="go(1)"  aria-label="Next month">›</button>
</div>

<div id="dow-row">
  <div class="dow-label we">S</div>
  <div class="dow-label">M</div>
  <div class="dow-label">T</div>
  <div class="dow-label">W</div>
  <div class="dow-label">T</div>
  <div class="dow-label">F</div>
  <div class="dow-label we">S</div>
</div>

<div id="cal-grid"></div>

<div id="setup-banner">
  No calendar connected — open <strong>index.html</strong>, find <code>calendarURLs</code> and paste your iCloud ICS URL.
</div>

<div id="footer">
  <div id="date-block">
    <div id="day-name">—</div>
    <div id="date-full">—</div>
  </div>
  <div id="cal-status"></div>
  <div id="clock">—</div>
</div>

<script>
// ─── Globals ──────────────────────────────────────────────────────────────
const MONTHS  = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS    = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
let viewOffset = 0;          // months from today; 0 = current month
let allEvents  = [];         // all parsed ICS events
let calOk      = false;      // has calendar loaded at least once?

// ─── Utilities ────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);

function today() {
  const n = new Date();
  return new Date(n.getFullYear(), n.getMonth(), n.getDate());
}

// ─── Clock ────────────────────────────────────────────────────────────────
function tick() {
  const now = new Date();
  let h = now.getHours(), m = now.getMinutes();
  const suffix = CONFIG.use12Hour ? (h < 12 ? ' AM' : ' PM') : '';
  if (CONFIG.use12Hour) h = h % 12 || 12;
  $('clock').textContent = `${h}:${String(m).padStart(2,'0')}${suffix}`;

  const t = today();
  $('day-name').textContent  = DAYS[t.getDay()].toUpperCase();
  $('date-full').textContent = `${MONTHS[t.getMonth()]} ${t.getDate()}, ${t.getFullYear()}`;
}

// ─── Calendar rendering ───────────────────────────────────────────────────
function go(delta) {
  viewOffset += delta;
  render();
}

function goToday() {
  viewOffset = 0;
  render();
}

function render() {
  const now  = new Date();
  const base = new Date(now.getFullYear(), now.getMonth() + viewOffset, 1);
  const yr   = base.getFullYear();
  const mo   = base.getMonth();
  const tod  = today();

  $('month-title').textContent = `${MONTHS[mo]} ${yr}`;

  const firstDow    = new Date(yr, mo, 1).getDay();
  const daysInMonth = new Date(yr, mo + 1, 0).getDate();
  const prevMonDays = new Date(yr, mo, 0).getDate();
  const weeks       = Math.ceil((firstDow + daysInMonth) / 7);

  const grid = $('cal-grid');
  grid.style.gridTemplateRows = `repeat(${weeks}, 1fr)`;
  grid.innerHTML = '';

  const eventMap = buildEventMap(yr, mo);

  for (let i = 0; i < weeks * 7; i++) {
    const cell = document.createElement('div');
    let day, cellYr = yr, cellMo = mo, isOther = false;

    if (i < firstDow) {
      day     = prevMonDays - firstDow + i + 1;
      cellMo  = mo - 1 < 0 ? 11 : mo - 1;
      cellYr  = mo - 1 < 0 ? yr - 1 : yr;
      isOther = true;
    } else if (i - firstDow < daysInMonth) {
      day = i - firstDow + 1;
    } else {
      day     = i - firstDow - daysInMonth + 1;
      cellMo  = mo + 1 > 11 ? 0 : mo + 1;
      cellYr  = mo + 1 > 11 ? yr + 1 : yr;
      isOther = true;
    }

    const cellDate = new Date(cellYr, cellMo, day);
    const dow      = i % 7;
    const isToday  = !isOther && cellDate.getTime() === tod.getTime();

    let cls = 'day';
    if (isOther)             cls += ' other';
    if (isToday)             cls += ' today';
    if (dow === 0 || dow === 6) cls += ' weekend';
    cell.className = cls;

    // Day number
    const nWrap = document.createElement('div'); nWrap.className = 'day-n-wrap';
    const nEl   = document.createElement('div'); nEl.className = 'day-n';
    nEl.textContent = day;
    nWrap.appendChild(nEl);
    cell.appendChild(nWrap);

    // Events
    if (!isOther) {
      const evs = eventMap[`${yr}-${mo}-${day}`] || [];
      const MAX = 4;
      evs.slice(0, MAX).forEach(ev => {
        const el = document.createElement('div');
        el.className = ev.allDay ? 'ev allday' : 'ev';
        if (!ev.allDay && ev.timeStr) {
          const t = document.createElement('span');
          t.className = 'ev-time';
          t.textContent = ev.timeStr;
          el.appendChild(t);
        }
        el.appendChild(document.createTextNode(ev.title));
        cell.appendChild(el);
      });
      if (evs.length > MAX) {
        const more = document.createElement('div');
        more.className = 'ev-more';
        more.textContent = `+${evs.length - MAX} more`;
        cell.appendChild(more);
      }
    }

    grid.appendChild(cell);
  }
}

// ─── ICS event map ────────────────────────────────────────────────────────
function buildEventMap(yr, mo) {
  const map   = {};
  const start = new Date(yr, mo, 1);
  const end   = new Date(yr, mo + 1, 0, 23, 59, 59);

  for (const ev of allEvents) {
    if (ev.cancelled) continue;
    const instances = ev.rrule ? expandRRule(ev, start, end) : [ev];
    for (const inst of instances) {
      const d = inst.startDate;
      if (d < start || d > end) continue;
      const key = `${yr}-${mo}-${d.getDate()}`;
      if (!map[key]) map[key] = [];
      map[key].push(inst);
    }
  }

  // Sort each day's events: all-day first, then by time
  for (const key of Object.keys(map)) {
    map[key].sort((a, b) => {
      if (a.allDay !== b.allDay) return a.allDay ? -1 : 1;
      return a.startDate - b.startDate;
    });
  }
  return map;
}

// ─── ICS parser ───────────────────────────────────────────────────────────
function parseICSDate(val) {
  val = val.trim();
  if (val.length === 8) {
    // DATE only — all-day
    return { date: new Date(+val.slice(0,4), +val.slice(4,6)-1, +val.slice(6,8)), allDay: true };
  }
  const y=+val.slice(0,4), mo=+val.slice(4,6)-1, d=+val.slice(6,8);
  const h=+val.slice(9,11), m=+val.slice(11,13), s=+val.slice(13,15)||0;
  const date = val.endsWith('Z')
    ? new Date(Date.UTC(y,mo,d,h,m,s))
    : new Date(y,mo,d,h,m,s);
  return { date, allDay: false };
}

function fmtTime(date, use12) {
  let h = date.getHours(), m = date.getMinutes();
  const suf = use12 ? (h<12?'a':'p') : '';
  if (use12) h = h%12||12;
  return m===0 ? `${h}${suf}` : `${h}:${String(m).padStart(2,'0')}${suf}`;
}

function parseICS(text) {
  text = text.replace(/\r\n[ \t]/g, '').replace(/\r\n/g, '\n').replace(/\r/g, '\n');
  const events = [];
  let ev = null;

  for (const raw of text.split('\n')) {
    const line = raw.trim();
    if (line === 'BEGIN:VEVENT') { ev = {}; continue; }
    if (line === 'END:VEVENT') {
      if (ev && ev.startDate) {
        ev.title    = ev.title || '(No title)';
        ev.timeStr  = ev.allDay ? null : fmtTime(ev.startDate, CONFIG.use12Hour);
        events.push(ev);
      }
      ev = null; continue;
    }
    if (!ev) continue;

    const ci  = line.indexOf(':');
    if (ci < 0) continue;
    const key = line.slice(0, ci).split(';')[0].toUpperCase();
    const val = line.slice(ci + 1);

    switch (key) {
      case 'SUMMARY':
        ev.title = val.replace(/\\,/g, ',').replace(/\\n/g, ' ').replace(/\\;/g, ';').trim();
        break;
      case 'DTSTART': {
        const p = parseICSDate(val);
        ev.startDate = p.date; ev.allDay = p.allDay;
        break;
      }
      case 'DTEND': {
        ev.endDate = parseICSDate(val).date;
        break;
      }
      case 'STATUS':
        if (val.trim() === 'CANCELLED') ev.cancelled = true;
        break;
      case 'RRULE':
        ev.rrule = val.trim();
        break;
    }
  }
  return events;
}

// ─── Basic RRULE expansion ────────────────────────────────────────────────
function expandRRule(ev, winStart, winEnd) {
  const parts = {};
  ev.rrule.split(';').forEach(p => { const [k,v]=p.split('='); parts[k]=v; });
  const freq  = parts['FREQ'];
  if (!freq) return [];

  const count = parts['COUNT'] ? +parts['COUNT'] : 500;
  const until = parts['UNTIL'] ? parseICSDate(parts['UNTIL']).date : null;
  const byDay = (parts['BYDAY']||'').split(',').filter(Boolean);
  const DOWMAP = ['SU','MO','TU','WE','TH','FR','SA'];
  const dur   = ev.endDate ? (ev.endDate - ev.startDate) : 0;
  const DAY   = 86400000;

  const out = [];
  let cur = new Date(ev.startDate), n = 0;

  while (n < count) {
    if (until && cur > until) break;
    if (cur > winEnd) break;

    if (cur >= winStart) {
      const dow = DOWMAP[cur.getDay()];
      if (!byDay.length || byDay.some(b => b.includes(dow))) {
        out.push({ ...ev,
          startDate: new Date(cur),
          endDate: ev.endDate ? new Date(cur.getTime()+dur) : undefined,
          timeStr: ev.allDay ? null : fmtTime(cur, CONFIG.use12Hour),
        });
      }
    }

    if      (freq==='DAILY')   cur = new Date(cur.getTime()+DAY);
    else if (freq==='WEEKLY')  cur = new Date(cur.getTime()+7*DAY);
    else if (freq==='MONTHLY') cur = new Date(cur.getFullYear(), cur.getMonth()+1, cur.getDate());
    else if (freq==='YEARLY')  cur = new Date(cur.getFullYear()+1, cur.getMonth(), cur.getDate());
    else break;
    n++;
  }
  return out;
}

// ─── ICS fetch ────────────────────────────────────────────────────────────
const PROXIES = [
  u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
  u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
  u => `https://cors-anywhere.herokuapp.com/${u}`,
];

async function fetchCalendars() {
  const urls = (CONFIG.calendarURLs || []).filter(Boolean);
  if (!urls.length) {
    $('setup-banner').style.display = 'block';
    $('cal-status').textContent = '';
    return;
  }

  $('cal-status').textContent = 'syncing…';
  const collected = [];

  for (const url of urls) {
    let ok = false;
    for (const proxy of PROXIES) {
      try {
        const res  = await fetch(proxy(url), { cache: 'no-store' });
        if (!res.ok) continue;
        const text = await res.text();
        if (!text.includes('BEGIN:VCALENDAR')) continue;
        collected.push(...parseICS(text));
        ok = true;
        break;
      } catch (_) {}
    }
    if (!ok) console.warn('Could not fetch:', url);
  }

  allEvents = collected;
  calOk     = true;
  const now = new Date();
  $('cal-status').textContent = `synced ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
  render();
}

// ─── Swipe ────────────────────────────────────────────────────────────────
let tx = null, ty = null;
document.addEventListener('touchstart', e => { tx = e.touches[0].clientX; ty = e.touches[0].clientY; }, {passive:true});
document.addEventListener('touchend', e => {
  if (tx === null) return;
  const dx = e.changedTouches[0].clientX - tx;
  const dy = e.changedTouches[0].clientY - ty;
  if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy) * 1.5) go(dx < 0 ? 1 : -1);
  tx = ty = null;
}, {passive:true});

// Double-tap anywhere to jump back to today
let lastTap = 0;
document.addEventListener('touchend', e => {
  const now = Date.now();
  if (now - lastTap < 300) goToday();
  lastTap = now;
}, {passive:true});

// ─── Wake lock ────────────────────────────────────────────────────────────
async function wakeLock() {
  try { if ('wakeLock' in navigator) await navigator.wakeLock.request('screen'); } catch(_) {}
}
wakeLock();
document.addEventListener('visibilitychange', () => { if (document.visibilityState==='visible') wakeLock(); });

// ─── Midnight refresh ─────────────────────────────────────────────────────
function scheduleMidnight() {
  const now  = new Date();
  const next = new Date(now.getFullYear(), now.getMonth(), now.getDate()+1);
  setTimeout(() => { if (viewOffset===0) render(); scheduleMidnight(); }, next-now);
}

// ─── Boot ─────────────────────────────────────────────────────────────────
tick();
setInterval(tick, 10000);   // update clock every 10 seconds

render();
scheduleMidnight();

fetchCalendars();
setInterval(fetchCalendars, CONFIG.refreshMinutes * 60000);
</script>
</body>
</html>
